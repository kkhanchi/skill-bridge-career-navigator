# Alembic configuration for SkillBridge.
#
# The SQLAlchemy URL is NOT set here — migrations/env.py pulls it from
# the active Flask config (CONFIG_MAP[APP_ENV].DATABASE_URL). This keeps
# one source of truth and avoids hardcoding credentials in a versioned
# file.

[alembic]
# Path (relative to this file) to the migration scripts directory.
script_location = migrations

# Template used when `alembic revision --autogenerate` creates new
# migrations.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for version file timestamps.
timezone = UTC

# Max length of slug field in the filename.
truncate_slug_length = 40

# Always output in console-friendly form.
output_encoding = utf-8

# sqlalchemy.url is intentionally absent — env.py sets it dynamically.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
